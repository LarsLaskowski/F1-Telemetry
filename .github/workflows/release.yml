name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  SERVER_REPOSITORY: networlddev/f1-telemetry
  SERVER_DOCKERFILE: Dockerfile
  APP_REPOSITORY: networlddev/f1-telemetry-app
  APP_DOCKERFILE: F1ServerApp/Dockerfile
  APP_CONTEXT: F1ServerApp

jobs:
  release:
    name: Build, Push & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      # Restore/build the backend entry points explicitly; a solution-wide build
      # would pull in the Windows-only WPF client and the Angular .esproj, which
      # fail on the Linux runner. The images themselves are built from the
      # Dockerfiles in the steps below.
      - name: Restore
        run: |
          dotnet restore F1Server/F1Server.csproj
          dotnet restore F1Server.Tests/F1Server.Tests.csproj

      - name: Build
        run: |
          dotnet build F1Server/F1Server.csproj -c Release --no-restore
          dotnet build F1Server.Tests/F1Server.Tests.csproj -c Release --no-restore

      - name: Test
        run: >
          dotnet test F1Server.Tests/F1Server.Tests.csproj
          -c Release --no-build
          --logger trx
          --results-directory ${{ runner.temp }}/TestResults

      - name: Log in to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract base image digests
        id: basedigest
        run: |
          docker pull mcr.microsoft.com/dotnet/aspnet:10.0-alpine
          docker pull nginx:1-alpine
          RUNTIME_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' mcr.microsoft.com/dotnet/aspnet:10.0-alpine)
          NGINX_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' nginx:1-alpine)
          echo "runtime=$RUNTIME_DIGEST" >> "$GITHUB_OUTPUT"
          echo "nginx=$NGINX_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build & push server image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ env.SERVER_DOCKERFILE }}
          push: true
          build-args: |
            BASE_RUNTIME_DIGEST=${{ steps.basedigest.outputs.runtime }}
          tags: |
            ${{ env.SERVER_REPOSITORY }}:${{ steps.version.outputs.version }}
            ${{ env.SERVER_REPOSITORY }}:latest

      - name: Build & push web app image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ env.APP_CONTEXT }}
          file: ${{ env.APP_DOCKERFILE }}
          push: true
          build-args: |
            BASE_NGINX_DIGEST=${{ steps.basedigest.outputs.nginx }}
          tags: |
            ${{ env.APP_REPOSITORY }}:${{ steps.version.outputs.version }}
            ${{ env.APP_REPOSITORY }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Docker images:

            - Server: `${{ env.SERVER_REPOSITORY }}:${{ steps.version.outputs.version }}`
            - Web app: `${{ env.APP_REPOSITORY }}:${{ steps.version.outputs.version }}`
