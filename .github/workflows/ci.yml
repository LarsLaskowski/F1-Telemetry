name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    env:
      # Secrets are not exposed to Dependabot or fork-triggered runs, so the
      # token is empty there. The SonarQube steps below are skipped in that
      # case so the build and tests still run.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: ${{ env.SONAR_TOKEN != '' && steps.cache-sonar-scanner.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p ${{ runner.temp }}/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}/scanner

      # The solution also contains a Windows-only WPF client (F1ReplayClient) and
      # the Angular .esproj, which a solution-wide restore would pull in and fail
      # on Linux. Restore/build the backend entry points explicitly instead; the
      # F1Server project graph covers all backend libraries and is the same set
      # the Dockerfile builds.
      - name: Restore
        run: |
          dotnet restore F1Server/F1Server.csproj
          dotnet restore F1Server.Tests/F1Server.Tests.csproj

      - name: Begin SonarQube analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          ${{ runner.temp }}/scanner/dotnet-sonarscanner begin \
            /k:"networlddev_f1-telemetry" \
            /o:"networlddev" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.exclusions="**/Migrations/**,F1ServerApp/**" \
            /d:sonar.cs.opencover.reportsPaths="${{ runner.temp }}/TestResults/**/coverage.opencover.xml"

      - name: Build
        run: |
          dotnet build F1Server/F1Server.csproj -c Release --no-restore
          dotnet build F1Server.Tests/F1Server.Tests.csproj -c Release --no-restore

      - name: Test
        run: >
          dotnet test F1Server.Tests/F1Server.Tests.csproj
          -c Release --no-build
          --logger trx
          --collect:"XPlat Code Coverage"
          --results-directory ${{ runner.temp }}/TestResults
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: End SonarQube analysis
        if: ${{ !cancelled() && env.SONAR_TOKEN != '' }}
        run: |
          ${{ runner.temp }}/scanner/dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publish test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        # Creating check runs needs a writable token, which Dependabot and
        # fork-triggered runs do not get. Skip there; the test step itself
        # still fails the job on a failing test.
        if: ${{ !cancelled() && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.fork != true }}
        with:
          name: dotnet tests
          path: ${{ runner.temp }}/TestResults/**/*.trx
          reporter: dotnet-trx

      - name: Upload test & coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            ${{ runner.temp }}/TestResults/**/*.trx
            ${{ runner.temp }}/TestResults/**/coverage.opencover.xml
          if-no-files-found: warn

  build-frontend:
    name: Build Angular app (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24, 25, 26]
    defaults:
      run:
        working-directory: F1ServerApp
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: F1ServerApp/package-lock.json

      # --force mirrors the frontend Dockerfile, which installs with the same
      # flag to tolerate the peer-dependency ranges of the Angular 22 stack.
      # --ignore-scripts is intentionally used to prevent arbitrary npm script
      # execution. The Angular 21+ dependency tree is well-known and audited,
      # and all pinned versions are locked in package-lock.json.
      - name: Install dependencies
        run: npm install --force --ignore-scripts

      - name: Build
        run: npm run build

      # No spec files exist yet. Enable this step once tests are added; the
      # ubuntu runners ship google-chrome-stable for the ChromeHeadless target.
      # - name: Test
      #   run: npm test -- --watch=false --browsers=ChromeHeadless
