name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 4 * * 1'  # every Monday at 04:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      # Build the backend entry point rather than the whole solution: the latter
      # pulls in the Windows-only WPF client and the Angular .esproj, which fail
      # to restore/build on the Linux runner. The F1Server project graph covers
      # all backend libraries (same set the Dockerfile builds).
      - name: Restore
        run: dotnet restore F1Server/F1Server.csproj

      - name: Build
        run: dotnet build F1Server/F1Server.csproj -c Release --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:csharp
