# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    # Bundle all NuGet updates into a single pull request instead of
    # opening a separate PR per package.
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/F1ServerApp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Angular's compiler-cli only supports the TypeScript minor it ships with
    # (peer range typescript ">=6.0 <6.1" for Angular 22). A TypeScript major
    # bump (e.g. 6.x -> 7.x) breaks "ng build" with
    # "Cannot read properties of undefined (reading 'Error')" in
    # readConfiguration. Hold TypeScript majors until Angular supports them.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    directories:
      - "/"
      - "/F1ServerApp"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
